name: Purge
run-name: 🧹Azure purge

permissions:
  contents: read

on:
  push:
    branches:
      - feat/DTFS2-16188-deployment
  schedule:
    - cron: '0 23 * * *'

env:
  APPLICATION: ${{ vars.APPLICATION }}
  TIMEZONE: ${{ vars.TIMEZONE_LONDON }}

jobs:
  # 1. Base actions configrations
  setup:
    name: Setup 🔧
    runs-on: [self-hosted, linux, deployment]
    outputs:
      application: ${{ env.APPLICATION }}
      environment: ${{ steps.environment.outputs.environment }}
      timezone: ${{ env.TIMEZONE }}

    steps:
      - name: Environment 🧪
        id: environment
        run: |
          echo "environment=infrastructure" >> "$GITHUB_OUTPUT"

      - name: Timezone 🌐
        run: echo "Timezone set to ${{ env.TIMEZONE }}"

  # 2. Azure purge
  purge:
    name: Purge 🗑️
    needs: [setup]
    environment: ${{ needs.setup.outputs.environment }}
    runs-on: [self-hosted, DTFS, deployment]
    env:
      ENVIRONMENT: ${{ needs.setup.outputs.environment }}

    strategy:
      # Do not cancel in-progress jobs upon failure
      fail-fast: false
      # Single dimension matrix
      matrix:
        acr: ['crdtfsdev0012lpd66flpami2']

    concurrency:
      group: acr-purge-${{ github.workflow }}-${{ github.workflow_ref }}-${{ matrix.acr }}
      cancel-in-progress: true

    steps:
      - name: Repository 🗂️
        uses: actions/checkout@v6

      - name: Subscription 🛠️
        run: |
          if [[ "${{ matrix.acr }}" == *"dev"* ]]; then
            echo "SUBSCRIPTION=${{ secrets.DEV1_SUBSCRIPTION }}" >> $GITHUB_ENV


      - name: Resource group 🛠️
        run: |
          if [[ "${{ matrix.acr }}" == *"dev"* ]]; then
            echo "RESOURCE_GROUP=${{ secrets.DEV1_RESOURCE_GROUP }}" >> $GITHUB_ENV


      - name: Execute ⚡
        uses: ./.github/actions/acr
        with:
          credentials: ${{ secrets.AZURE_CREDENTIALS_ACR_PURGE_DEV1 }}
          subscription: ${{ env.SUBSCRIPTION }}
          group: ${{ env.RESOURCE_GROUP }}
          acr: ${{ matrix.acr }}
          days: ${{ vars.ACR_PURGE_NONPROD_DAYS }}

      - name: Notification  🔔
        uses: ./.github/actions/notify
        with:
          webhook: ${{ secrets.MSTEAMS_WEBHOOK }}
          content: '
                      {
              "@type": "MessageCard",
              "@context": "http://schema.org/extensions",
              "themeColor": "00703c",
              "title": "🗑️ ${{ matrix.acr }} purge",
              "summary": "Purged artefacts from ''${{ matrix.acr }}'' Azure container registry",
              "sections": [
                {
                  "activityTitle": "ACR Purge",
                  "activitySubtitle": "Purged artefacts from **${{ matrix.acr }}** Azure container registry",
                  "facts": [
                    { "name": "ACR", "value": "${{ matrix.acr }}" },
                    { "name": "Resource group", "value": "${{ env.RESOURCE_GROUP }}" },
                    { "name": "Commit", "value": "${{ github.sha }}" }
                  ],
                  "markdown": true
                }
              ],
              "potentialAction": [
                {
                  "@type": "OpenUri",
                  "name": "Workflow",
                  "targets": [
                    {
                      "os": "default",
                      "uri": "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                    }
                  ]
                }
              ]
            }
            '
