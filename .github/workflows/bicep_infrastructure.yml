          sed -i "s|{{PEERING_REMOTE_VNET_SUBSCRIPTION_ID}}|${{ secrets.PEERING_REMOTE_VNET_SUBSCRIPTION_ID }}|g" ./infrastructure/resource_group_level/parameters_dev.json
