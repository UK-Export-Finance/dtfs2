# Infrastructure Deployment Workflow
#
# This GitHub Actions workflow automates the deployment of Azure infrastructure
# for the DTFS project. It performs the following main tasks:
#
# 1. Sets up the environment and variables
# 2. Logs in to Azure
# 3. Creates or updates the resource group
# 4. Replaces placeholders in the parameters.json file with actual values from GitHub secrets
# 5. Deploys Azure resources using the Bicep template
#
# The workflow is triggered on pushes to the main branch and uses environment
# variables and secrets for configuration. It's designed to work with the
# main.bicep and parameters.json files in the infrastructure directory.
#
# Note: Ensure all required secrets and variables are set in the GitHub repository
# settings before running this workflow.

name: Infrastructure 🔨
run-name: DTFS base infrastructure build from ${{ github.repository }}

on:
  push:
    branches:
      - feat/DTFS2-16188-bicep-templates
    paths:
      - '.github/workflows/bicep_infrastructure.yml'
      - 'infrastructure/resource_group_level/**'
  workflow_dispatch:

env:
  PRODUCT: dtfs2
  ENVIRONMENT: infrastructure
  TIMEZONE: '${{ vars.TIMEZONE }}'
  # Deployment environment target i.e., `development`, `staging`, `production`
  TARGET: ${{ vars.TARGET }}

jobs:
# 1. Setup infrastructure variables
  setup:
    name: Setup 🔧
    runs-on: [self-hosted, linux, deployment]
    outputs:
      environment: ${{ env.ENVIRONMENT }}
      timezone: ${{ env.TIMEZONE }}
    steps:
      - name: Repository 🗃️
        uses: actions/checkout@v4

      - name: Environment 🧪
        run: echo "Environment set to ${{ env.ENVIRONMENT }}"

      - name: Timezone 🌐
        run: echo "Timezone set to ${{ env.TIMEZONE }}"

      - name: Login 🔐
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_DEV_CREDENTIALS }}

      - name: Azure defaults ✨
        uses: azure/cli@v2
        with:
          inlineScript: |
            # Basic
            az configure --defaults location=${{ vars.REGION }}
            az configure --defaults group=rg-${{ env.PRODUCT }}-${{ env.TARGET }}-${{ vars.VERSION }}

      - name: Create Resource group 🏗️
        uses: azure/cli@v2
        with:
          inlineScript: |
            az group create \
            --location ${{ vars.REGION }} \
            --resource-group rg-${{ env.PRODUCT }}-${{ env.TARGET }}-${{ vars.VERSION }} \
            --name rg-${{ env.PRODUCT }}-${{ env.TARGET }}-${{ vars.VERSION }}

      - name: Set Resource Group Name
        run: echo "RESOURCE_GROUP_NAME=rg-${{ env.PRODUCT }}-${{ env.TARGET }}-${{ vars.VERSION }}" >> $GITHUB_ENV



# 2. Validate infrastructure resources
  Resource-Deploy:
    name: Deploy Resources 📊
    needs: setup
    runs-on: [self-hosted, linux, deployment]
    steps:
      - name: Repository 🗃️
        uses: actions/checkout@v4

      - name: Login 🔐
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_DEV_CREDENTIALS }}

      - name: Set bicep properties ✨
        env:
          PEERING_REMOTE_VNET_SUBSCRIPTION_ID: ${{ secrets.PEERING_REMOTE_VNET_SUBSCRIPTION_ID }}
          AZ_DEV_VNET_ADDRESS_PREFIX: ${{ secrets.AZ_DEV_VNET_ADDRESS_PREFIX }}
          AZ_DEV_SNET_APPGW_CIDR_PREFIX: ${{ secrets.AZ_DEV_SNET_APPGW_CIDR_PREFIX }}
          AZ_DEV_SNET_ASP_EGRESS_PREFIX_CIDR: ${{ secrets.AZ_DEV_SNET_ASP_EGRESS_PREFIX_CIDR }}
          ACA_CLAMAV_CIDR: ${{ secrets.AZ_DEV_SNET_ACA_CLAMAV_CIDR }}
          PRIVATE_ENDPOINTS_CIDR: ${{ secrets.AZ_DEV_SNET_PRIVATE_EP_CIDR }}
          PROD_SUBNET_CIDR: ${{ secrets.PROD_SUBNET_CIDR }}
          ROUTE_TBL_NEXT_HOP_ADDRESS: ${{ secrets.ROUTE_TBL_NEXT_HOP_ADDRESS }}
          UKEF_VPN_IPS: ${{ secrets.UKEF_VPN_IPS }}
          AZ_PORTAL_IPS: ${{ secrets.AZ_PORTAL_IPS }}
          RATE_LIMIT_THRESHOLD: ${{ secrets.RATE_LIMIT_THRESHOLD }}
          APIM_TFS_KEY: ${{ secrets.APIM_TFS_KEY }}
          APIM_TFS_VALUE: ${{ secrets.APIM_TFS_VALUE }}
          APIM_TFS_URL: ${{ secrets.APIM_TFS_URL }}
          APIM_MDM_KEY: ${{ secrets.APIM_MDM_KEY }}
          APIM_MDM_URL: ${{ secrets.APIM_MDM_URL }}
          APIM_MDM_VALUE: ${{ secrets.APIM_MDM_VALUE }}
          APIM_MDM_KEY_VAULT_NAME: ${{ secrets.APIM_MDM_KEY_VAULT_NAME }}
          COMPANIES_HOUSE_API_URL: ${{ secrets.COMPANIES_HOUSE_API_URL }}
          ORDNANCE_SURVEY_API_URL: ${{ secrets.ORDNANCE_SURVEY_API_URL }}
          APIM_ESTORE_URL: ${{ secrets.APIM_ESTORE_URL }}
          CORS_ORIGIN: ${{ secrets.CORS_ORIGIN }}
          APIM_ESTORE_KEY: ${{ secrets.APIM_ESTORE_KEY }}
          APIM_ESTORE_VALUE: ${{ secrets.APIM_ESTORE_VALUE }}
          COMPANIES_HOUSE_API_KEY: ${{ secrets.COMPANIES_HOUSE_API_KEY }}
          GOV_NOTIFY_EMAIL_RECIPIENT: ${{ secrets.GOV_NOTIFY_EMAIL_RECIPIENT }}
          GOV_NOTIFY_API_KEY: ${{ secrets.GOV_NOTIFY_API_KEY }}
          EXTERNAL_API_KEY: ${{ secrets.EXTERNAL_API_KEY }}
          ORDNANCE_SURVEY_API_KEY: ${{ secrets.ORDNANCE_SURVEY_API_KEY }}
          UTILISATION_REPORT_CREATION_FOR_BANKS_SCHEDULE: ${{ secrets.UTILISATION_REPORT_CREATION_FOR_BANKS_SCHEDULE }}
          DTFS_CENTRAL_API_KEY: ${{ secrets.DTFS_CENTRAL_API_KEY }}
          PDC_INPUTTERS_EMAIL_RECIPIENT: ${{ secrets.PDC_INPUTTERS_EMAIL_RECIPIENT }}
          AZURE_PORTAL_EXPORT_FOLDER: ${{ secrets.AZURE_PORTAL_EXPORT_FOLDER }}
          AZURE_PORTAL_FILESHARE_NAME: ${{ secrets.AZURE_PORTAL_FILESHARE_NAME }}
          JWT_VALIDATING_KEY: ${{ secrets.JWT_VALIDATING_KEY }}
          PORTAL_API_KEY: ${{ secrets.PORTAL_API_KEY }}
          TFM_API_KEY: ${{ secrets.TFM_API_KEY }}
          SESSION_SECRET: ${{ secrets.SESSION_SECRET }}
          UKEF_TFM_API_SYSTEM_KEY: ${{ secrets.UKEF_TFM_API_SYSTEM_KEY }}
          ESTORE_URL: ${{ secrets.ESTORE_URL }}
          UKEF_TFM_API_REPORTS_KEY: ${{ secrets.UKEF_TFM_API_REPORTS_KEY }}
          AZURE_NUMBER_GENERATOR_FUNCTION_SCHEDULE: ${{ secrets.AZURE_NUMBER_GENERATOR_FUNCTION_SCHEDULE }}
          UKEF_INTERNAL_NOTIFICATION: ${{ secrets.UKEF_INTERNAL_NOTIFICATION }}

        run: |
          BICEP_PARAMETERS="version=${{ vars.VERSION }} \
            product=${{ vars.PRODUCT }} \
            target=${{ vars.TARGET }} \
            environment=${{ vars.ENVIRONMENT }} \
            peeringRemoteVnetSubscriptionId=$PEERING_REMOTE_VNET_SUBSCRIPTION_ID \
            vnetAddressPrefix=$AZ_DEV_VNET_ADDRESS_PREFIX \
            applicationGatewayCidr=$AZ_DEV_SNET_APPGW_CIDR_PREFIX \
            appServicePlanEgressPrefixCidr=$AZ_DEV_SNET_ASP_EGRESS_PREFIX_CIDR \
            acaClamAvCidr=$ACA_CLAMAV_CIDR \
            privateEndpointsCidr=$PRIVATE_ENDPOINTS_CIDR \
            productionSubnetCidr=$PROD_SUBNET_CIDR \
            routeTableNextHopAddress=$ROUTE_TBL_NEXT_HOP_ADDRESS \
            onPremiseNetworkIpsString=$UKEF_VPN_IPS \
            azurePortalIpsString=$AZ_PORTAL_IPS \
            RATE_LIMIT_THRESHOLD=$RATE_LIMIT_THRESHOLD \
            APIM_TFS_KEY=$APIM_TFS_KEY \
            APIM_TFS_VALUE=$APIM_TFS_VALUE \
            APIM_TFS_URL=$APIM_TFS_URL \
            APIM_MDM_KEY=$APIM_MDM_KEY \
            APIM_MDM_URL=$APIM_MDM_URL \
            APIM_MDM_VALUE=$APIM_MDM_VALUE \
            APIM_MDM_KEY_VAULT_NAME=$APIM_MDM_KEY_VAULT_NAME \
            COMPANIES_HOUSE_API_URL=$COMPANIES_HOUSE_API_URL \
            ORDNANCE_SURVEY_API_URL=$ORDNANCE_SURVEY_API_URL \
            APIM_ESTORE_URL=$APIM_ESTORE_URL \
            CORS_ORIGIN=$CORS_ORIGIN \
            APIM_ESTORE_KEY=$APIM_ESTORE_KEY \
            APIM_ESTORE_VALUE=$APIM_ESTORE_VALUE \
            COMPANIES_HOUSE_API_KEY=$COMPANIES_HOUSE_API_KEY \
            GOV_NOTIFY_EMAIL_RECIPIENT=$GOV_NOTIFY_EMAIL_RECIPIENT \
            GOV_NOTIFY_API_KEY=$GOV_NOTIFY_API_KEY \
            EXTERNAL_API_KEY=$EXTERNAL_API_KEY \
            ORDNANCE_SURVEY_API_KEY=$ORDNANCE_SURVEY_API_KEY \
            UTILISATION_REPORT_CREATION_FOR_BANKS_SCHEDULE=$UTILISATION_REPORT_CREATION_FOR_BANKS_SCHEDULE \
            DTFS_CENTRAL_API_KEY=$DTFS_CENTRAL_API_KEY \
            PDC_INPUTTERS_EMAIL_RECIPIENT=$PDC_INPUTTERS_EMAIL_RECIPIENT \
            AZURE_PORTAL_EXPORT_FOLDER=$AZURE_PORTAL_EXPORT_FOLDER \
            AZURE_PORTAL_FILESHARE_NAME=$AZURE_PORTAL_FILESHARE_NAME \
            JWT_VALIDATING_KEY=$JWT_VALIDATING_KEY \
            PORTAL_API_KEY=$PORTAL_API_KEY \
            TFM_API_KEY=$TFM_API_KEY \
            SESSION_SECRET=$SESSION_SECRET \
            UKEF_TFM_API_SYSTEM_KEY=$UKEF_TFM_API_SYSTEM_KEY \
            ESTORE_URL=$ESTORE_URL \
            UKEF_TFM_API_REPORTS_KEY=$UKEF_TFM_API_REPORTS_KEY \
            AZURE_NUMBER_GENERATOR_FUNCTION_SCHEDULE=$AZURE_NUMBER_GENERATOR_FUNCTION_SCHEDULE \
            UKEF_INTERNAL_NOTIFICATION=$UKEF_INTERNAL_NOTIFICATION"

          echo "BICEP_PARAMETERS=$BICEP_PARAMETERS" >> "$GITHUB_ENV"

      - name: Install Bicep
        run: |
          az config set bicep.use_binary_from_path=False
          az bicep install
          az bicep upgrade
          az bicep version

      - name: Deploy Azure Resources
        uses: azure/arm-deploy@v2
        with:
          subscriptionId: ${{ secrets.AZURE_DEV_SUBSCRIPTION_ID }}
          resourceGroupName: rg-${{ env.PRODUCT }}-${{ env.TARGET }}-${{ vars.VERSION }}
          template: ./infrastructure/resource_group_level/main.bicep
          parameters: ${{ env.BICEP_PARAMETERS }}
          scope: resourcegroup

